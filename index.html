<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Daniel's Squad Playbook v2</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
:root {
  --gold:#FFB700; --court:#C88B3A; --court-dark:#8B5E1A;
  --bg:#08080E; --panel:#101018; --panel2:#161622;
  --border:#1C1C28; --text:#F0EDE6; --muted:#6E6E82;
  --red:#FF4D4D; --green:#39D98A; --blue:#4D9EFF; --purple:#CC88FF;
  --ai:#FF6B35;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}

/* ── TOP HEADER ── */
header{
  background:linear-gradient(135deg,#0b0b14,#181028);
  border-bottom:2px solid var(--gold);
  padding:22px 28px 18px;
  display:flex; align-items:flex-end; gap:18px; flex-wrap:wrap;
  position:relative; overflow:hidden;
}
header::after{
  content:''; position:absolute; top:-50px;right:-50px;
  width:220px;height:220px;
  background:radial-gradient(circle,rgba(255,183,0,.10) 0%,transparent 70%);
  pointer-events:none;
}
.hbadge{
  background:var(--gold);color:#000;font-family:'Bebas Neue',sans-serif;
  font-size:10px;letter-spacing:2px;padding:3px 9px;border-radius:2px;
  display:inline-block;margin-bottom:5px;
}
header h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(26px,5vw,44px);letter-spacing:3px;line-height:1;}
header h1 span{color:var(--gold);}
header .sub{font-size:12px;color:var(--muted);margin-top:4px;letter-spacing:.4px;}

/* ── STAT BAR ── */
.statbar{
  display:flex;border-bottom:1px solid var(--border);
  background:#0c0c14;overflow-x:auto;flex-shrink:0;
}
.si{
  padding:14px 22px;border-right:1px solid var(--border);
  text-align:center;min-width:100px;flex-shrink:0;
}
.sv{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--gold);line-height:1;}
.sl{font-size:9px;color:var(--muted);letter-spacing:1.4px;text-transform:uppercase;margin-top:2px;}

/* ── TAB BAR ── */
.tabbar{
  display:flex;gap:2px;background:var(--bg);
  border-bottom:1px solid var(--border);
  padding:0 16px;overflow-x:auto;
}
.tabbar button{
  padding:12px 18px;font-family:'Bebas Neue',sans-serif;font-size:14px;
  letter-spacing:1.5px;background:transparent;border:none;
  color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;
  white-space:nowrap;transition:all .2s;
}
.tabbar button:hover{color:var(--text);}
.tabbar button.active{color:var(--gold);border-bottom-color:var(--gold);}
.tabbar button .pill{
  font-size:9px;padding:1px 6px;border-radius:8px;margin-left:6px;
  font-family:'DM Sans',sans-serif;font-weight:600;letter-spacing:.5px;
  vertical-align:middle;
}
.pill-5v5{background:rgba(57,217,138,.15);color:var(--green);}
.pill-ai{background:rgba(255,107,53,.18);color:var(--ai);}
.pill-rules{background:rgba(255,183,0,.13);color:var(--gold);}

/* ── MAIN LAYOUT ── */
.layout{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 175px);}

/* ── SIDEBAR ── */
.sidebar{
  background:var(--panel);border-right:1px solid var(--border);
  overflow-y:auto;
}
.sgroup{padding:14px 0 4px;}
.sgroup-title{
  font-size:9px;letter-spacing:2px;color:var(--muted);
  text-transform:uppercase;padding:0 16px 8px;
}
.pbtn{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;cursor:pointer;
  border-left:3px solid transparent;
  background:transparent;width:100%;text-align:left;
  border-top:none;border-right:none;border-bottom:none;
  color:var(--text);transition:all .18s;
}
.pbtn:hover{background:rgba(255,183,0,.05);}
.pbtn.active{border-left-color:var(--gold);background:rgba(255,183,0,.07);}
.pbtn .pnum{
  font-family:'Bebas Neue',sans-serif;font-size:18px;
  color:var(--muted);width:24px;line-height:1;flex-shrink:0;
}
.pbtn.active .pnum,.pbtn:hover .pnum{color:var(--gold);}
.pbtn .pi{flex:1;}
.pbtn .pn{font-size:12px;font-weight:600;}
.pbtn .pt{font-size:10px;color:var(--muted);margin-top:1px;}
.spill{
  font-size:8px;padding:2px 6px;border-radius:8px;
  font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  flex-shrink:0;
}
.sp-5v5{background:rgba(57,217,138,.12);color:var(--green);}
.sp-ai{background:rgba(255,107,53,.15);color:var(--ai);}
.sdiv{height:1px;background:var(--border);margin:6px 14px;}

/* ── CONTENT ── */
.content{padding:28px 28px 40px;overflow-y:auto;}

/* ── PLAY HEADER ── */
.play-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;gap:16px;flex-wrap:wrap;}
.play-hdr-left .ptag{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px;}
.play-hdr-left h2{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;line-height:1;}
.play-hdr-left .pdesc{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.6;max-width:480px;}
.ai-badge{
  background:rgba(255,107,53,.15);border:1px solid rgba(255,107,53,.35);
  color:var(--ai);font-size:10px;font-weight:700;letter-spacing:1.5px;
  padding:4px 10px;border-radius:3px;text-transform:uppercase;
  display:inline-block;margin-top:6px;
}
.animBtn{
  background:var(--gold);color:#000;border:none;
  padding:10px 20px;font-family:'Bebas Neue',sans-serif;
  font-size:15px;letter-spacing:2px;cursor:pointer;
  border-radius:3px;transition:all .18s;white-space:nowrap;flex-shrink:0;
}
.animBtn:hover{background:#ffc933;transform:translateY(-1px);}

/* ── ROLES BAR ── */
.roles{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.rchip{
  display:flex;align-items:center;gap:7px;
  background:var(--panel2);border:1px solid var(--border);
  border-radius:16px;padding:6px 12px;font-size:11px;
}
.rdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.rname{font-weight:600;}
.rnote{color:var(--muted);font-size:10px;margin-left:2px;}
/* AI slot highlight */
.rchip.ai-slot{
  border-color:rgba(255,107,53,.4);
  background:rgba(255,107,53,.07);
}
.rchip.ai-slot .rdot{box-shadow:0 0 6px var(--ai);}

/* ── COURT ── */
.court-wrap{
  background:var(--panel);border:1px solid var(--border);
  border-radius:6px;padding:16px;margin-bottom:22px;
}
.clabel{
  font-size:9px;letter-spacing:2px;color:var(--muted);
  text-transform:uppercase;margin-bottom:12px;
  display:flex;align-items:center;gap:8px;
}
.clabel::after{content:'';flex:1;height:1px;background:var(--border);}
canvas{display:block;width:100%;max-width:600px;margin:0 auto;border-radius:3px;}

/* ── AI WARNING BOX ── */
.ai-warn{
  background:rgba(255,107,53,.06);
  border:1px solid rgba(255,107,53,.25);
  border-radius:6px;padding:16px;margin-bottom:20px;
}
.ai-warn-title{
  font-family:'Bebas Neue',sans-serif;font-size:17px;
  letter-spacing:1px;color:var(--ai);margin-bottom:10px;
}
.ai-warn ul{list-style:none;display:flex;flex-direction:column;gap:6px;}
.ai-warn li{font-size:12px;color:var(--text);display:flex;gap:8px;line-height:1.55;}
.ai-warn li::before{content:'⚠';flex-shrink:0;}

/* ── STEPS ── */
.steps{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:22px;}
.step{
  background:var(--panel2);border:1px solid var(--border);
  border-radius:5px;padding:14px;
  border-left:3px solid var(--border);transition:border-color .2s;
}
.step.s-pg{border-left-color:var(--blue);}
.step.s-sh{border-left-color:var(--red);}
.step.s-hi{border-left-color:var(--gold);}
.step.s-ai{border-left-color:var(--ai);}
.step .snum{
  font-family:'Bebas Neue',sans-serif;font-size:24px;
  color:var(--border);line-height:1;margin-bottom:3px;
}
.step.s-pg .snum{color:var(--blue);}
.step.s-sh .snum{color:var(--red);}
.step.s-hi .snum{color:var(--gold);}
.step.s-ai .snum{color:var(--ai);}
.step .swho{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
.step .sact{font-size:12px;line-height:1.55;}

/* ── TIPS ── */
.tips{
  background:rgba(255,183,0,.04);border:1px solid rgba(255,183,0,.18);
  border-radius:5px;padding:16px;margin-bottom:18px;
}
.tips h3{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;color:var(--gold);margin-bottom:10px;}
.tips ul{list-style:none;display:flex;flex-direction:column;gap:7px;}
.tips li{font-size:12px;display:flex;gap:9px;line-height:1.55;}
.tips li::before{content:'→';color:var(--gold);flex-shrink:0;}

/* ── 4v5 SPECIFIC SECTION ── */
.ai-scenario-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:24px;}
.ai-card{
  background:var(--panel2);border:1px solid var(--border);
  border-radius:6px;padding:18px;
  border-top:3px solid var(--ai);
}
.ai-card h3{
  font-family:'Bebas Neue',sans-serif;font-size:18px;
  letter-spacing:1px;color:var(--ai);margin-bottom:3px;
}
.ai-card .ac-sub{font-size:10px;color:var(--muted);margin-bottom:12px;letter-spacing:.5px;}
.ai-card ul{list-style:none;display:flex;flex-direction:column;gap:8px;}
.ai-card li{font-size:12px;display:flex;gap:9px;line-height:1.55;}
.ai-card li::before{content:'▸';color:var(--ai);flex-shrink:0;margin-top:1px;}
.ai-card li strong{color:var(--text);}
.ai-card .ac-play{
  background:rgba(255,107,53,.10);border:1px solid rgba(255,107,53,.2);
  border-radius:3px;padding:6px 10px;margin-top:12px;
  font-size:11px;color:var(--ai);font-weight:600;
}

/* ── RULES PAGE ── */
.rsec{margin-bottom:28px;}
.rsec h3{
  font-family:'Bebas Neue',sans-serif;font-size:20px;
  letter-spacing:2px;color:var(--gold);margin-bottom:14px;
  padding-bottom:7px;border-bottom:1px solid var(--border);
}
.rlist{display:flex;flex-direction:column;gap:9px;}
.ritem{
  background:var(--panel2);border:1px solid var(--border);
  border-radius:5px;padding:12px 14px;font-size:12px;
  line-height:1.6;display:flex;gap:11px;align-items:flex-start;
}
.ricon{font-size:16px;flex-shrink:0;margin-top:1px;}
.rtext strong{color:var(--gold);}
.rtext .rsub{color:var(--muted);font-size:11px;margin-top:2px;}

/* ── MISC ── */
.fade-in{animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}

/* ── TABLET ── */
@media(max-width:900px){
  .layout{grid-template-columns:200px 1fr;}
  .content{padding:20px 18px 32px;}
  .ai-scenario-grid{grid-template-columns:1fr;}
}

/* ── MOBILE ── */
@media(max-width:680px){
  header{padding:16px 16px 14px;}
  header h1{font-size:28px;}
  header .sub{font-size:11px;}
  .statbar{display:none;} /* hide stat bar on small screens — saves space */
  .tabbar{padding:0 8px;}
  .tabbar button{padding:10px 10px;font-size:12px;letter-spacing:1px;}
  .tabbar button .pill{display:none;}
  .layout{grid-template-columns:1fr;}
  .sidebar{
    border-right:none;border-bottom:1px solid var(--border);
    display:flex;flex-wrap:wrap;padding:6px 0;
    max-height:120px;overflow-y:auto;
  }
  .pbtn{border-left:none;border-bottom:3px solid transparent;flex:1;min-width:110px;padding:10px 10px;}
  .pbtn.active{border-bottom-color:var(--gold);border-left-color:transparent;}
  .pbtn .pnum{font-size:15px;width:20px;}
  .pbtn .pn{font-size:11px;}
  .pbtn .pt{display:none;}
  .spill{display:none;}
  .content{padding:14px 12px 32px;}
  .steps{grid-template-columns:1fr;}
  .play-hdr{flex-direction:column;gap:10px;}
  .play-hdr-left h2{font-size:26px;}
  .animBtn{width:100%;text-align:center;}
  .roles{gap:6px;}
  .rchip{font-size:10px;padding:5px 10px;}
  .court-wrap{padding:12px;}
  .ai-scenario-grid{grid-template-columns:1fr;}
  .ai-card{padding:14px;}
  .sgroup-title{font-size:8px;}
  .tips li{font-size:11px;}
  .step .sact{font-size:11px;}
}
</style>
</head>
<body>

<header>
  <div>
    <div class="hbadge">NBA 2K26 — SQUAD PLAYBOOK V2</div>
    <h1>DANIEL'S <span>SYSTEM</span></h1>
    <div class="sub">5v5 Full Plays · 4v5 AI Scenarios · 15+ AST · Anti-Double Strategy</div>
  </div>
</header>

<div class="statbar">
  <div class="si"><div class="sv">99</div><div class="sl">Pass Acc</div></div>
  <div class="si"><div class="sv">15+</div><div class="sl">AST Goal</div></div>
  <div class="si"><div class="sv">11</div><div class="sl">Total Plays</div></div>
  <div class="si"><div class="sv">5</div><div class="sl">AI Scenarios</div></div>
  <div class="si"><div class="sv">🤖</div><div class="sl">AI Proof</div></div>
</div>

<div class="tabbar">
  <button class="active" onclick="switchTab('5v5',this)">5V5 PLAYS <span class="pill pill-5v5">6</span></button>
  <button onclick="switchTab('ai',this)">4V5 AI SCENARIOS <span class="pill pill-ai">5</span></button>
  <button onclick="switchTab('rules',this)">SYSTEM RULES <span class="pill pill-rules">LAW</span></button>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="content" id="content"></div>
</div>

<script>
// ─── PLAYER DEFINITIONS ───
const DEF = {
  pg:     {label:'PG', name:'Daniel (You)',      color:'#4D9EFF'},
  sg:     {label:'SG', name:'Shooting Guard',    color:'#FF4D4D'},
  sf:     {label:'SF', name:'Small Forward',     color:'#39D98A'},
  pf:     {label:'PF', name:'Power Forward',     color:'#CC88FF'},
  c:      {label:'C',  name:'Center',            color:'#FFB700'},
  ai:     {label:'AI', name:'AI Teammate',       color:'#FF6B35'},
};

// ─── 5V5 PLAYS ───
const plays5v5 = [
{
  id:'p1', name:'Drop & Pop', tag:'PLAY 01 — SHOOTER FEED',
  desc:'Classic drive-and-kick. You attack the paint drawing two defenders then kick to your shooter in the corner. The spacing with all 5 players forces the defense to cover the whole court.',
  roles:[
    {key:'pg',note:'Drive & kick'},
    {key:'sg',note:'Strong corner — primary target'},
    {key:'sf',note:'Weak wing — second option'},
    {key:'pf',note:'Weak corner — third option'},
    {key:'c', note:'High ball screen → pop arc'},
  ],
  steps:[
    {who:'ALL TEAMMATES',act:'Spread to 5-out first. SG to strong corner, SF to weak wing, PF to weak corner, C at the top of the arc. Nobody inside the 3-point line.',cls:'s-hi'},
    {who:'Daniel (PG)',act:'Dribble toward the elbow behind a ball screen from C. Attack the paint hard — if 2 defenders collapse, the kick is automatic.',cls:'s-pg'},
    {who:'SG (Shooter)',act:'Stay parked in the strong corner. Hands up, knees bent. The MOMENT Daniel\'s feet enter the paint, be ready to catch and fire.',cls:'s-sh'},
    {who:'C',act:'Set the ball screen then pop to the arc. You\'re the safety valve if the corner is guarded.',cls:'s-hi'},
    {who:'Daniel (PG)',act:'Count defenders. One comes? Keep going. Two come? Kick to SG corner. Three come (trap)? Skip to PF weak corner — longest kick-out, highest value.',cls:'s-pg'},
  ],
  tips:[
    'With all 5 spread, a double-team on your drive always leaves someone open — you just need to find who.',
    'SG: if your defender cheats toward Daniel early, cut backdoor immediately. That\'s a layup.',
    'If PF corner is open, use the skip pass with icon targeting — don\'t risk a cross-court turnover.',
    '5-out spacing makes this play harder to defend than any 3-man play.',
  ],
  anim:'dropPop5',
  pos:[
    {key:'pg',x:.50,y:.42},{key:'sg',x:.88,y:.76},{key:'sf',x:.10,y:.70},
    {key:'pf',x:.12,y:.82},{key:'c', x:.50,y:.30},
  ],
},
{
  id:'p2', name:'Horns Kick', tag:'PLAY 02 — FAKE DHO CORNER 3',
  desc:'Classic Horns alignment (C + PF at elbows). You fake the hand-off to freeze the defense while your SG sprints baseline to the corner.',
  roles:[
    {key:'pg',note:'DHO fake initiator'},
    {key:'sg',note:'Baseline cut → corner 3'},
    {key:'sf',note:'Opposite corner hold'},
    {key:'pf',note:'Left elbow — screen anchor'},
    {key:'c', note:'Right elbow — DHO partner'},
  ],
  steps:[
    {who:'C + PF',act:'Line up at both elbows simultaneously. This is your cue to the team that you\'re running Horns. Hold position until Daniel calls for it.',cls:'s-hi'},
    {who:'SG',act:'Start on the weak-side wing. Walk casually. When Daniel reaches the elbow and extends his hand, SPRINT to the strong-side corner baseline.',cls:'s-sh'},
    {who:'Daniel (PG)',act:'Dribble toward C on the right elbow like you\'re doing a DHO. Reach your hand out — sell it hard. Your defender AND C\'s defender will freeze.',cls:'s-pg'},
    {who:'Daniel (PG)',act:'PULL BACK the fake. Pivot immediately and fire the pass to SG sprinting to the corner. Hit them in rhythm — pass to where they\'re going, not where they are.',cls:'s-pg'},
    {who:'SF + PF',act:'SF stays in weak corner (keeps their man from helping). PF acts as a natural screen in SG\'s path as they cut — a bonus obstacle for their defender.',cls:'s-hi'},
  ],
  tips:[
    'The fake DHO only works when BOTH you and C commit to it visually. Sell it or don\'t run it.',
    'SG: time your sprint to the moment Daniel\'s hand reaches out. Too early = defender reads it. Too late = you\'re not ready.',
    'If SG\'s defender fights through the cut, C at the elbow is your easy mid-range or 3.',
    'This play works even better after you\'ve run one real DHO earlier in the game.',
  ],
  anim:'horns5',
  pos:[
    {key:'pg',x:.50,y:.44},{key:'sg',x:.15,y:.62},{key:'sf',x:.09,y:.78},
    {key:'pf',x:.35,y:.30},{key:'c', x:.65,y:.30},
  ],
},
{
  id:'p3', name:'Spread & Slash', tag:'PLAY 03 — 5-OUT ISO + KICK',
  desc:'When their PG can\'t guard you, call spread. All 4 teammates go to the arc giving you a true 1v1. If one defender helps, you have an open shooter — always.',
  roles:[
    {key:'pg',note:'ISO driver — read help'},
    {key:'sg',note:'Strong corner — trigger man'},
    {key:'sf',note:'Weak wing'},
    {key:'pf',note:'Weak corner'},
    {key:'c', note:'Top of arc opposite'},
  ],
  steps:[
    {who:'Daniel (PG)',act:'Call "SPREAD" out loud. All 4 teammates go to 5-out positions. You\'re now 1-on-1.',cls:'s-pg'},
    {who:'ALL 4 TEAMMATES',act:'Do NOT move from your spot unless Daniel drives past you. Freeze. Movement without purpose destroys spacing.',cls:'s-hi'},
    {who:'Daniel (PG)',act:'Attack your matchup. Be decisive — hesitation kills ISO plays. If they sag off, shoot the 3. If they overplay, blow by.',cls:'s-pg'},
    {who:'Daniel (PG)',act:'The moment a help defender moves off their man, STOP and fire the pass. Icon pass to the open man. 99 pass accuracy means you hit the pocket every time.',cls:'s-pg'},
    {who:'SG',act:'Strong corner is default kick target. Hands up before the pass arrives. If your man collapses on Daniel, you\'re getting the ball.',cls:'s-sh'},
  ],
  tips:[
    'Don\'t run this play unless you genuinely have the matchup advantage. Bad ISO = wasted possession.',
    'If you draw the double early (before you even drive), that\'s a skip pass to PF weak corner — they\'re most open.',
    'If nobody helps at all, take the layup. Never force a pass when the rim is free.',
    'Run this play at most twice in a row. Third time the defense will adjust and double early.',
  ],
  anim:'spread5',
  pos:[
    {key:'pg',x:.50,y:.48},{key:'sg',x:.88,y:.76},{key:'sf',x:.12,y:.62},
    {key:'pf',x:.10,y:.80},{key:'c', x:.72,y:.54},
  ],
},
{
  id:'p4', name:'Center Pop 3', tag:'PLAY 04 — PNR POP TO ARC',
  desc:'Your C wants to shoot 3s — feed that. Run a pick-and-roll but instead of the roll to the rim, C POPS out to the 3-point line. Smaller defenders can\'t contest it.',
  roles:[
    {key:'pg',note:'PnR ball handler'},
    {key:'sg',note:'Weak wing — stretch'},
    {key:'sf',note:'Weak corner — stretch'},
    {key:'pf',note:'Strong corner — shooter'},
    {key:'c', note:'Ball screen → immediate pop'},
  ],
  steps:[
    {who:'SG + SF + PF',act:'Clear to the weak side. SG on weak wing, SF weak corner, PF strong corner. This creates a 2-man game on the right side for Daniel and C.',cls:'s-hi'},
    {who:'C',act:'Set a hard ball screen on Daniel\'s right shoulder defender. Make CONTACT — a ghost screen is useless.',cls:'s-hi'},
    {who:'Daniel (PG)',act:'Use the screen. Read: (1) defender goes over screen = pull-up 3 yourself, (2) defender goes under = mid-range, (3) switch happens → C has a size mismatch.',cls:'s-pg'},
    {who:'C',act:'The INSTANT you feel the screen contact, pop back to the 3-point line fast. Don\'t roll — pop. If they switched, you have a small guarding you — that\'s money.',cls:'s-hi'},
    {who:'Daniel (PG)',act:'If they switched, fire the skip pass to C at the 3-point line. If they didn\'t switch and C is open, pass. If nothing opens, pull up or draw foul.',cls:'s-pg'},

function lerp(a,b,t){return a+(b-a)*t;}
function ease(t){return t<.5?2*t*t:-1+(4-2*t)*t;}

function drawCourt(ctx,W,H){
  ctx.fillStyle='#C88B3A';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#8B5E1A';ctx.fillRect(W*.33,0,W*.34,H*.38);
  ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=1.5;ctx.setLineDash([]);
  // FT line
  ctx.beginPath();ctx.moveTo(W*.33,H*.38);ctx.lineTo(W*.67,H*.38);ctx.stroke();
  // 3-pt arc
  ctx.beginPath();ctx.arc(W*.5,0,H*.72,.18*Math.PI,.82*Math.PI);ctx.stroke();
  // 3-pt corners
  [[W*.09,0,W*.09,H*.28],[W*.91,0,W*.91,H*.28]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  });
  // hoop
  ctx.beginPath();ctx.arc(W*.5,H*.07,W*.025,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,.7)';ctx.lineWidth=2;ctx.stroke();
  // backboard
  ctx.beginPath();ctx.moveTo(W*.38,H*.04);ctx.lineTo(W*.62,H*.04);
  ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=2.5;ctx.stroke();
  ctx.setLineDash([]);
}

function drawPlayer(ctx,x,y,key,W,H,glow){
  const d=DEF[key]; if(!d)return;
  const px=x*W,py=y*H,r=W*.034;
  if(glow){ctx.save();ctx.shadowColor=d.color;ctx.shadowBlur=16;}
  ctx.beginPath();ctx.arc(px,py,r,0,Math.PI*2);
  ctx.fillStyle=d.color;ctx.fill();
  ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
  if(glow)ctx.restore();
  ctx.fillStyle='#000';
  ctx.font=`bold ${Math.round(r*.85)}px DM Sans,sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(d.label,px,py);
}

function drawBall(ctx,x,y,W,H){
  const px=x*W,py=y*H,r=W*.024;
  ctx.save();ctx.shadowColor='#FF9A3C';ctx.shadowBlur=10;
  ctx.beginPath();ctx.arc(px,py,r,0,Math.PI*2);
  ctx.fillStyle='#FF9A3C';ctx.fill();
  ctx.strokeStyle='#a05010';ctx.lineWidth=1;ctx.stroke();
  ctx.restore();
}

function drawArrow(ctx,x1,y1,x2,y2,col,W,H,dashed){
  ctx.save();
  ctx.strokeStyle=col;ctx.lineWidth=2;
  if(dashed)ctx.setLineDash([5,4]);else ctx.setLineDash([]);
  ctx.beginPath();ctx.moveTo(x1*W,y1*H);ctx.lineTo(x2*W,y2*H);ctx.stroke();
  // arrowhead
  const angle=Math.atan2((y2-y1)*H,(x2-x1)*W);
  const hs=8;
  ctx.fillStyle=col;ctx.beginPath();
  ctx.moveTo(x2*W,y2*H);
  ctx.lineTo(x2*W-hs*Math.cos(angle-Math.PI/6),y2*H-hs*Math.sin(angle-Math.PI/6));
  ctx.lineTo(x2*W-hs*Math.cos(angle+Math.PI/6),y2*H-hs*Math.sin(angle+Math.PI/6));
  ctx.closePath();ctx.fill();
  ctx.restore();
}

    };
  },
  // AI animations — highlight the AI player with glow
  ai5_pg:(ctx,t,W,H)=>{
    const e=ease(Math.min(t,1));
    const pgX=lerp(.50,.58,e), pgY=lerp(.44,.28,e);
    const pt=Math.max(0,(t-.6)/.4), pe=ease(Math.min(pt,1));
    const bX=lerp(pgX,.88,pe), bY=lerp(pgY,.76,pe)-Math.sin(pe*Math.PI)*.07;
    drawArrow(ctx,.50,.44,pgX,pgY,COLORS.arrow,W,H,true);
    if(pt>0)drawArrow(ctx,pgX,pgY,.88,.76,COLORS.arrowRed,W,H,false);
    return{pg:{x:pgX,y:pgY},ai:{x:.50,y:.60},sg:{x:.88,y:.76},sf:{x:.10,y:.70},c:{x:.50,y:.30},ball:{x:bX,y:bY}};
  },
  ai5_sg:(ctx,t,W,H)=>{
    const e=ease(Math.min(t,1));
    const pgX=lerp(.50,.50,1), pgY=lerp(.46,.24,e);
    const pt=Math.max(0,(t-.6)/.4), pe=ease(Math.min(pt,1));
    // skip to PF weak corner
    const bX=lerp(pgX,.10,pe), bY=lerp(pgY,.82,pe)-Math.sin(pe*Math.PI)*.08;
    drawArrow(ctx,.50,.46,.50,pgY,COLORS.arrow,W,H,true);
    if(pt>0)drawArrow(ctx,pgX,pgY,.10,.82,COLORS.arrowAI,W,H,false);
    return{pg:{x:pgX,y:pgY},ai:{x:.88,y:.72},sf:{x:.10,y:.66},pf:{x:.10,y:.82},c:{x:.50,y:.30},ball:{x:bX,y:bY}};
  },
  ai5_sf:(ctx,t,W,H)=>{
    const e=ease(Math.min(t,1));
    const pgX=lerp(.50,.58,e), pgY=lerp(.46,.28,e);
    const pt=Math.max(0,(t-.55)/.45), pe=ease(Math.min(pt,1));
    const bX=lerp(pgX,.85,pe), bY=lerp(pgY,.72,pe)-Math.sin(pe*Math.PI)*.06;
    drawArrow(ctx,.50,.46,pgX,pgY,COLORS.arrow,W,H,true);
    if(pt>0)drawArrow(ctx,pgX,pgY,.85,.72,COLORS.arrowRed,W,H,false);
    return{pg:{x:pgX,y:pgY},sg:{x:.85,y:.72},ai:{x:.10,y:.72},pf:{x:.14,y:.82},c:{x:.58,y:.30},ball:{x:bX,y:bY}};
  },
  ai5_pf:(ctx,t,W,H)=>{
    const e=ease(Math.min(t,1));
    const cX=lerp(.50,.66,e), cY=lerp(.28,.52,e);
    const pgX=lerp(.50,.54,e), pgY=lerp(.46,.30,e);
    const pt=Math.max(0,(t-.6)/.4), pe=ease(Math.min(pt,1));
    const bX=lerp(pgX,cX,pe), bY=lerp(pgY,cY,pe)-Math.sin(pe*Math.PI)*.06;
    ctx.save();ctx.strokeStyle='rgba(255,183,0,.65)';ctx.lineWidth=2;ctx.setLineDash([5,4]);
    ctx.beginPath();ctx.moveTo(.50*W,.28*H);ctx.lineTo(cX*W,cY*H);ctx.stroke();ctx.restore();
    return{pg:{x:pgX,y:pgY},sg:{x:.88,y:.72},sf:{x:.12,y:.68},ai:{x:.10,y:.82},c:{x:cX,y:cY},ball:{x:bX,y:bY}};
  },
  ai5_c:(ctx,t,W,H)=>{
    const e=ease(Math.min(t,1));
    const pgY=lerp(.46,.24,e);
    const pt=Math.max(0,(t-.6)/.4), pe=ease(Math.min(pt,1));
    const bX=lerp(.50,.88,pe), bY=lerp(pgY,.74,pe)-Math.sin(pe*Math.PI)*.06;
    drawArrow(ctx,.50,.46,.50,pgY,COLORS.arrow,W,H,true);
    if(pt>0)drawArrow(ctx,.50,pgY,.88,.74,COLORS.arrowRed,W,H,false);
    return{pg:{x:.50,y:pgY},sg:{x:.88,y:.74},sf:{x:.12,y:.66},pf:{x:.10,y:.80},ai:{x:.68,y:.56},ball:{x:bX,y:bY}};
  },
};

function runAnim(animKey,canvas){
  if(_raf){cancelAnimationFrame(_raf);_raf=null;}
  _t=0;_running=true;
  // Ensure canvas has real dimensions before animating
  if(!canvas.width||canvas.width<10){
    const rect=canvas.getBoundingClientRect();
    const dpr=window.devicePixelRatio||1;
    canvas.width=(rect.width||600)*dpr;
    canvas.height=((rect.width||600)*380/600)*dpr;
  }
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  const fn=animFns[animKey]; if(!fn)return;
  function tick(){
    ctx.clearRect(0,0,W,H);
    drawCourt(ctx,W,H);
    const t=_t/DUR;
    const pos=fn(ctx,t,W,H);
    Object.entries(pos).forEach(([k,p])=>{
      if(k==='ball')return;
      drawPlayer(ctx,p.x,p.y,k,W,H,k==='pg');
    });
    if(pos.ball)drawBall(ctx,pos.ball.x,pos.ball.y,W,H);
    _t++;
    if(_t<DUR)_raf=requestAnimationFrame(tick);
    else{_t=0;_raf=requestAnimationFrame(tick);}
  }
  _raf=requestAnimationFrame(tick);
}

function drawStatic(positions,canvas){
  if(!canvas||!positions)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);drawCourt(ctx,W,H);
  positions.forEach(p=>drawPlayer(ctx,p.x,p.y,p.key,W,H,p.key==='pg'));
  const pg=positions.find(p=>p.key==='pg');
  if(pg)drawBall(ctx,pg.x+.04,pg.y-.03,W,H);
}

function initCanvas(canvasId,positions){
  setTimeout(()=>{
    const el=document.getElementById(canvasId);
    if(!el)return;
    const rect=el.getBoundingClientRect();
    const dpr=window.devicePixelRatio||1;
    el.width=rect.width*dpr;
    el.height=(rect.width*380/600)*dpr;
    el.style.height=(rect.width*380/600)+'px';
    drawStatic(positions,el);
  },60);
}

// ── STATE ──
let currentTab='5v5';
let currentPlayId=null;
let animRunning=false;
let currentAnimKey=null;
let currentPositions=null;

// ── TOGGLE ANIMATION ──
window.toggleAnim=function(){
  const canvas=document.getElementById('cc');
  const btn=document.getElementById('ab');
  if(!canvas||!currentAnimKey)return;
  if(!animRunning){
    animRunning=true;
    if(btn)btn.textContent='⏹ STOP';
    runAnim(currentAnimKey,canvas);
  }else{
    animRunning=false;
    if(btn)btn.textContent='▶ ANIMATE';
    if(_raf){cancelAnimationFrame(_raf);_raf=null;}
    if(currentPositions)drawStatic(currentPositions,canvas);
  }
};

// ── RENDER SIDEBAR ──

  const sb=document.getElementById('sidebar');
  if(currentTab==='5v5'){
    sb.innerHTML=`<div class="sgroup"><div class="sgroup-title">5v5 Plays</div>`+
      plays5v5.map((p,i)=>`
        <button class="pbtn${currentPlayId===p.id?' active':''}" onclick="selectPlay('${p.id}',this)">
          <div class="pnum">${String(i+1).padStart(2,'0')}</div>
          <div class="pi"><div class="pn">${p.name}</div><div class="pt">${p.tag.split('—')[1]?.trim()||''}</div></div>
          <span class="spill sp-5v5">5V5</span>

      playsAI.map(p=>`
        <button class="pbtn${currentPlayId===p.id?' active':''}" onclick="selectPlay('${p.id}',this)">

          <div class="pi"><div class="pn">${p.name}</div><div class="pt">${p.tag.split('—')[1]?.trim()||''}</div></div>
          <span class="spill sp-ai">AI</span>

    sb.innerHTML=`<div class="sgroup"><div class="sgroup-title">Rules</div>
      <button class="pbtn active"><div class="pnum">📖</div><div class="pi"><div class="pn">System Rules</div><div class="pt">Read this first</div></div></div>
    </div>`;
  }
}

// ── RENDER PLAY ──
function renderPlay5v5(play){
  const rolesHTML=play.roles.map(r=>`
    <div class="rchip">
      <div class="rdot" style="background:${DEF[r.key]?.color}"></div>
      <span class="rname">${DEF[r.key]?.label}</span>
      <span class="rnote">— ${r.note}</span>
    </div>`).join('');
  const stepsHTML=play.steps.map((s,i)=>`
    <div class="step ${s.cls}">
      <div class="snum">${String(i+1).padStart(2,'0')}</div>
      <div class="swho">${s.who}</div>
      <div class="sact">${s.act}</div>
    </div>`).join('');
  const tipsHTML=play.tips.map(t=>`<li>${t}</li>`).join('');

  currentAnimKey=play.anim;
  currentPositions=play.pos;
  document.getElementById('content').innerHTML=`<div class="fade-in">
    <div class="play-hdr">
      <div class="play-hdr-left">
        <div class="ptag">${play.tag}</div>
        <h2>${play.name}</h2>
        <div class="pdesc">${play.desc}</div>
      </div>
      <button class="animBtn" id="ab" onclick="toggleAnim()">▶ ANIMATE</button>
    </div>
    <div class="roles">${rolesHTML}</div>
    <div class="court-wrap">
      <div class="clabel">Half-Court Diagram</div>
      <canvas id="cc" width="600" height="368"></canvas>
    </div>
    <div class="steps">${stepsHTML}</div>
    <div class="tips"><h3>🧠 Daniel's Notes</h3><ul>${tipsHTML}</ul></div>
  </div>`;
  animRunning=false;
  initCanvas('cc',play.pos);
}

  const rolesHTML=play.pos.map(p=>`
    <div class="rchip${p.key==='ai'?' ai-slot':''}">
      <div class="rdot" style="background:${DEF[p.key]?.color}"></div>
      <span class="rname">${DEF[p.key]?.label}</span>
      <span class="rnote">— ${p.key==='ai'?'AI TEAMMATE':DEF[p.key]?.name}</span>
    </div>`).join('');

  const warningsHTML=play.aiWarnings.map(w=>`<li>${w}</li>`).join('');
  const strategiesHTML=play.strategies.map(s=>`
    <div class="ai-card">

      <div class="ac-play">📋 BEST PLAY: ${s.play}</div>

    <div class="play-hdr">
      <div class="play-hdr-left">
        <div class="ptag">${play.tag}</div>
        <h2>${play.name}</h2>

      </div>

    <div class="roles">${rolesHTML}</div>

      <div class="clabel">Formation Diagram — AI highlighted in orange</div>

    <div class="ai-warn">

function renderRules(){
  document.getElementById('content').innerHTML=`<div class="fade-in">
    <div class="play-hdr"><div class="play-hdr-left">
      <div class="ptag">SYSTEM RULES</div>
      <h2 style="color:var(--gold)">The Laws of the System</h2>
      <div class="pdesc">The principles that make 15+ assists possible — and how to survive a 4v5.</div>
    </div></div>

    <div class="rsec">
      <h3>🏀 The 5 Laws of 15 Assists</h3>
      <div class="rlist">
        <div class="ritem"><div class="ricon">👁️</div><div class="rtext"><strong>See the floor before you dribble.</strong> Scan corners and wings as you cross half court. 99 pass accuracy is useless if you don't know who's open.<div class="rsub">Habit: glance at both corners before you receive the inbound.</div></div></div>
        <div class="ritem"><div class="ricon">🎯</div><div class="rtext"><strong>SG gets the first look every possession.</strong> If your shooter is open — even slightly — that's the pass. No exceptions. They're why defenses sag off you.<div class="rsub">Rule: if SG hasn't touched the ball in 3 straight possessions, run Drop & Pop immediately.</div></div></div>
        <div class="ritem"><div class="ricon">🧊</div><div class="rtext"><strong>ISO only on real mismatches.</strong> You'll feel it when you can score at will. Any other time — run a play, move the ball.<div class="rsub">Rule: never ISO twice in a row unless you scored the first time.</div></div></div>
        <div class="ritem"><div class="ricon">📐</div><div class="rtext"><strong>Spacing is non-negotiable.</strong> Two teammates on the same side collapses the play. Call it out before the possession starts.<div class="rsub">Rule: no two teammates closer than 15 feet unless they're in a screen.</div></div></div>
        <div class="ritem"><div class="ricon">🔄</div><div class="rtext"><strong>Ball movement beats any defense.</strong> The ball moves faster than a defender. One extra pass creates a wide-open look a drive never would.<div class="rsub">Rule: if a play doesn't open in 4 seconds, reset. Don't force it.</div></div></div>
      </div>
    </div>

    <div class="rsec">
      <h3>🤖 The 3 Laws of Surviving a 4v5 (AI on Squad)</h3>
      <div class="rlist">
        <div class="ritem"><div class="ricon">🔍</div><div class="rtext"><strong>Identify the double EARLY.</strong> The moment you get the ball, look for the second defender. If they're coming before you've dribbled — you already know where to go.<div class="rsub">Don't wait for the double to arrive. Pre-read it and be mid-throw when they get there.</div></div></div>
        <div class="ritem"><div class="ricon">🎭</div><div class="rtext"><strong>Use the AI as a body, not a playmaker.</strong> Park them in the corner or elbow. Don't throw them the ball expecting plays — use their presence as a screen or spacer.<div class="rsub">The opponent is ignoring AI — use that to your advantage by running cuts off them.</div></div></div>
        <div class="ritem"><div class="ricon">⚡</div><div class="rtext"><strong>Speed up vs. a 4v5 — don't slow down.</strong> The longer the possession, the more time the opponent has to double. Push pace, make quick decisions, punish their scheme before they set it up.<div class="rsub">Fast passes beat doubles. Hesitation kills 4v5 possessions.</div></div></div>
      </div>
    </div>

    <div class="rsec">
      <h3>📢 Call System — Say These Out Loud</h3>
      <div class="rlist">
        <div class="ritem"><div class="ricon">🗣️</div><div class="rtext"><strong>"Corner"</strong> — SG: strong corner NOW. Everyone else hold.<div class="rsub">Use before a drive when you need SG in position first.</div></div></div>
        <div class="ritem"><div class="ricon">🗣️</div><div class="rtext"><strong>"Spread"</strong> — All 4 go to 5-out. ISO incoming.<div class="rsub">Use when you spot a weak matchup and want clean 1v1 space.</div></div></div>
        <div class="ritem"><div class="ricon">🗣️</div><div class="rtext"><strong>"Pop"</strong> — C: step out to the arc. PnR pop play.<div class="rsub">Use mid dribble-drive when you want C popping instead of rolling.</div></div></div>
        <div class="ritem"><div class="ricon">🗣️</div><div class="rtext"><strong>"Flow"</strong> — Motion offense, keep moving, find the open man.<div class="rsub">Use when the team has rhythm and you want to sustain it.</div></div></div>
        <div class="ritem"><div class="ricon">🗣️</div><div class="rtext"><strong>"Double coming"</strong> — Alert for AI game: skip pass ready. Everyone be a target.<div class="rsub">Use the moment you see the AI's defender start leaving to help.</div></div></div>
      </div>
    </div>
  </div>`;
}

// ── SELECT & SWITCH ──
window.selectPlay=function(id,btn){
  animRunning=false;if(_raf){cancelAnimationFrame(_raf);_raf=null;}
  currentPlayId=id;
  document.querySelectorAll('.pbtn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  const play=[...plays5v5,...playsAI].find(p=>p.id===id);
  if(!play)return;
  if(currentTab==='5v5')renderPlay5v5(play);
  else renderPlayAI(play);
};

window.switchTab=function(tab,btn){
  animRunning=false;if(_raf){cancelAnimationFrame(_raf);_raf=null;}
  currentTab=tab;
  document.querySelectorAll('.tabbar button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(tab==='rules'){
    currentPlayId=null;
    renderSidebar();
    renderRules();
    return;
  }
  const list=tab==='5v5'?plays5v5:playsAI;
  currentPlayId=list[0].id;
  renderSidebar();
  if(tab==='5v5')renderPlay5v5(list[0]);
  else renderPlayAI(list[0]);
};

// Init
currentPlayId=plays5v5[0].id;
renderSidebar();
renderPlay5v5(plays5v5[0]);
